name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-x86_64-pc-windows-msvc-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-pc-windows-msvc-target-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item -Path "target/x86_64-pc-windows-msvc/release/cs2shock.exe" -Destination "release/"
          Copy-Item -Path "README.md" -Destination "release/"
          Copy-Item -Path "config.json" -Destination "release/"
          Copy-Item -Path "gamestate_integration_cs2shock.cfg" -Destination "release/"
          Compress-Archive -Path release/* -DestinationPath cs2shock-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows x64
          path: cs2shock-windows-x64.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## CS2Shock ${{ steps.get_version.outputs.version }}
            
            ### Installation
            1. Download the appropriate binary for your platform
            2. Extract the archive
            3. Follow the instructions in the README.md
            
            ### Platform
            - Windows x64 only (because who plays CS2 on Linux or Mac anyway?)
            
            ⚠️ **WARNING**: This code was written by AI. Use at your own risk. See README for full disclaimer.
          files: |
            artifacts/**/*
