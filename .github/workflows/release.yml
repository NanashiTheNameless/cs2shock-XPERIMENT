name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-x86_64-pc-windows-msvc-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-pc-windows-msvc-target-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item -Path "target/x86_64-pc-windows-msvc/release/cs2shock.exe" -Destination "release/"
          Copy-Item -Path "README.md" -Destination "release/"
          Copy-Item -Path "config.json" -Destination "release/"
          Copy-Item -Path "gamestate_integration_cs2shock.cfg" -Destination "release/"
          Compress-Archive -Path release/* -DestinationPath cs2shock-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows x64
          path: cs2shock-windows-x64.zip
          retention-days: 30

      - name: Deploy Release
        uses: NanashiTheNameless/deploy-nightly@master
        with:
          upload_url: https://uploads.github.com/repos/NanashiTheNameless/cs2shock-XPERIMENT/releases/285366245/assets{?name,label}
          release_id: 285366245
          asset_path: cs2shock-windows-x64.zip
          asset_name: cs2shock_windows-x64-nightly-$$.zip
          asset_content_type: application/zip
          max_releases: 1
          ignore_hash: true

  release:
    name: Update Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update release tag
        uses: NanashiTheNameless/action-create-tag@main
        with:
          tag: "Nightly"
          tag_exists_error: false
          force_push_tag: true
          message: "Nightly Auto Build"
